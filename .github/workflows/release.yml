name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # create the GitHub Release
  id-token: write   # OIDC token for npm trusted publishing

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      # Trusted publishing (OIDC) requires npm >= 11.5.1.
      - run: npm install -g npm@latest

      - run: npm ci
      - run: npm test

      # Guard: the git tag (vX.Y.Z) must match package.json version.
      - name: Verify tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION" >&2
            exit 1
          fi

      - name: Extract CHANGELOG section for this version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v v="$VERSION" '
            $0 ~ "^## \\[" v "\\]" { grab=1; next }
            grab && /^## \[/ { exit }
            grab && /^\[[^]]+\]: / { exit }
            grab { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          echo "----- release notes -----"; cat RELEASE_NOTES.md

      # OIDC trusted publishing — no token; provenance is automatic.
      # Requires a trusted publisher configured on npmjs.com for this repo + release.yml.
      - name: Publish to npm
        run: npm publish --access public

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file RELEASE_NOTES.md
